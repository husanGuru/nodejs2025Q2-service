services:
  app:
    build: ./
    volumes:
      - ./:/app
      - /app/node_modules
    restart: always
    ports:
      - '4000:4000'
    networks:
      - nest-app-network
    depends_on:
      - postgres
  postgres:
    image: postgres
    restart: always
    ports:
      - '5432:5432'
    networks:
      - nest-app-network
    shm_size: 128mb
    env_file:
      - .env
    volumes:
      - postgres-data:/var/lib/postgresql/data
  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080

networks:
  nest-app-network:
    driver: bridge

volumes:
  postgres-data:
